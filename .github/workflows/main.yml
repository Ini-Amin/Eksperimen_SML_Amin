name: ML Pipeline

on:
  push:
    branches: [main]
    paths:
      - "BankChurners.csv"
      - "preprocessing/**"
  pull_request:
    branches: [main]
    paths:
      - "BankChurners.csv"
      - "preprocessing/**"
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3 numpy==2.1.3 scikit-learn==1.5.2 matplotlib==3.9.2 seaborn==0.13.2

      - name: Run preprocessing pipeline
        run: |
          cd preprocessing
          python automate_amin.py

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: |
            preprocessing/BankChurners_preprocessing.csv
